{% extends 'base.html' %}

{% block content %}
<section class="view-section active">
    <header class="view-header">
        <span class="view-label">/ notes</span>
        <h1>Notes Analyzer</h1>
        <p>Upload a photo of handwritten notes or a PDF — get clean structured markdown.</p>
    </header>

    <div class="digitize-container">
        <!-- Upload Area -->
        <div class="upload-area" id="upload-area">
            <input type="file" id="file-input" accept="image/*,.pdf" hidden />
            <div class="upload-prompt">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                    <polyline points="17 8 12 3 7 8"></polyline>
                    <line x1="12" y1="3" x2="12" y2="15"></line>
                </svg>
                <p>Drop an image or PDF here, or click to browse</p>
                <span class="file-name" id="file-name">no file selected</span>
            </div>
            <button id="process-btn" class="btn-outline" disabled>Digitize notes</button>
        </div>
        
        <!-- Result Area -->
        <div class="result-area hidden" id="result-area">
            <div class="result-header">
                <h3>Structured Output</h3>
                <button id="copy-btn" class="btn-ghost">Copy</button>
            </div>
            <div id="markdown-output" class="markdown-body">
                <!-- Processed content replaces this -->
            </div>
            <button id="reset-btn" class="btn-ghost" style="margin-top: 16px; align-self: flex-start;">← Upload another</button>
        </div>

        <!-- Loader -->
        <div id="loader" class="loader-container hidden">
            <div class="spinner"></div>
            <p>Analyzing your notes...</p>
        </div>
    </div>
</section>
{% endblock %}
